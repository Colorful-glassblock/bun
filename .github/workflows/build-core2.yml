name: Build for Core2 with SSSE3

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      # --- 强化版 vendor 克隆 ---
      - name: Clone vendor dependencies
        run: |
          set -euo pipefail

          # Remove any stale vendor directory and create parent
          rm -rf vendor/lolhtml
          mkdir -p vendor

          REPO_URL="https://github.com/cloudflare/lol-html.git"
          TARGET_DIR="vendor/lolhtml"

          echo "Cloning lol-html into ${TARGET_DIR}..."

          # Retry git clone a few times to avoid transient network failures
          success=0
          for i in 1 2 3; do
            if git clone --depth 1 "${REPO_URL}" "${TARGET_DIR}"; then
              success=1
              break
            else
              echo "git clone attempt ${i} failed, retrying..."
              sleep $((i * 2))
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "Error: git clone failed after retries"
            exit 1
          fi

          echo "Contents of ${TARGET_DIR} (top level):"
          ls -la "${TARGET_DIR}" || true

          # Try to find a Cargo.toml anywhere inside the repo (limit depth to 4)
          found=$(find "${TARGET_DIR}" -maxdepth 4 -name Cargo.toml -print -quit || true)

          if [ -z "$found" ]; then
            echo "Error: Cargo.toml not found in ${TARGET_DIR} (repo layout unexpected)."
            echo "Listing full tree for debugging:"
            find "${TARGET_DIR}" -maxdepth 6 -type f -print
            exit 1
          fi

          echo "Found Cargo.toml at: $found"

          # If Cargo.toml is not at repo root, move the subcrate contents to TARGET_DIR so Cargo can read it.
          if [ "$found" != "${TARGET_DIR}/Cargo.toml" ]; then
            echo "Cargo.toml is in a subdirectory. Normalizing layout..."
            sub_root=$(dirname "$found")
            tmpdir=$(mktemp -d)
            echo "Copying subcrate from $sub_root into temporary dir $tmpdir"
            cp -a "$sub_root/." "$tmpdir/"
            # Remove everything except .git to avoid leaving stray files; then copy subcrate over
            rm -rf "${TARGET_DIR:?}"/*
            cp -a "$tmpdir/." "${TARGET_DIR}/"
            rm -rf "$tmpdir"
            echo "Rewritten ${TARGET_DIR} to use subcrate contents from $sub_root"
            echo "New ${TARGET_DIR} contents:"
            ls -la "${TARGET_DIR}"
          fi

          # Final verification
          if [ ! -f "${TARGET_DIR}/Cargo.toml" ]; then
            echo "Error: ${TARGET_DIR}/Cargo.toml still missing after normalization"
            exit 1
          fi

          echo "✓ Vendor dependency ready"

      # --- 安装 Clang 21（必须在 Bun 之前）---
      - name: Install Clang 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main"
          sudo apt-get update
          sudo apt-get install -y clang-21 lld-21
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-21 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-21 100
          sudo update-alternatives --install /usr/bin/lld lld /usr/bin/lld-21 100
          clang --version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libssl-dev

      # --- 生成构建配置（bun bd 或 fallback）---
      - name: Generate build config
        run: |
          mkdir -p build/debug/codegen
          if bun bd --configure-only; then
            echo "✓ bun bd succeeded"
          else
            echo "⚠️  bun bd failed, using fallback"
            printf '%s\n' \
              'pub const BUILD_ARCH: &str = "x86_64";' \
              'pub const BUILD_OS: &str = "linux";' \
              'pub const IS_DEBUG: bool = false;' \
              'pub const HAS_SIMD: bool = true;' \
              'pub const ENABLE_SSSE3: bool = true;' \
              > build/debug/codegen/build_options.rs
          fi
          cat build/debug/codegen/build_options.rs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      # --- Cargo 配置 ---
      - name: Configure Cargo
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [build]
          jobs = 4

          [target.x86_64-unknown-linux-gnu]
          linker = "clang"
          rustflags = [
              "-C", "target-cpu=core2",
              "-C", "target-feature=+ssse3",
              "-C", "lto=off",
              "-C", "codegen-units=8",
              "-C", "debuginfo=0",
              "-C", "opt-level=0",
              "-C", "panic=abort",
          ]

          [profile.release]
          opt-level = 0
          debug = false
          lto = false
          codegen-units = 8
          panic = "abort"
          incremental = false
          EOF

      - name: Build
        run: |
          # 再次确认 vendor/lolhtml 存在（防止缓存干扰）
          if [ ! -f "vendor/lolhtml/Cargo.toml" ]; then
            echo "ERROR: vendor/lolhtml/Cargo.toml missing before build!"
            exit 1
          fi
          cargo clean
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Verify
        run: |
          BIN=$(find target/x86_64-unknown-linux-gnu/release/ -maxdepth 1 -type f -executable | head -1)
          echo "Binary: $BIN"
          echo "Size: $(du -h "$BIN" | cut -f1)"
          echo "SSSE3 instructions count:"
          objdump -d "$BIN" 2>/dev/null | grep -i ssse3 | wc -l

      - uses: actions/upload-artifact@v4
        with:
          name: bun-core2-binary
          path: target/x86_64-unknown-linux-gnu/release/
          if-no-files-found: error
