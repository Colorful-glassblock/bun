name: Build for Core2 with SSSE3

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1

    - name: Install Clang 21
      run: |
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        sudo add-apt-repository -y "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main"
        sudo apt-get update
        sudo apt-get install -y clang-21 lld-21
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-21 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-21 100
        clang --version

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Setup vendor dependencies
      run: |
        # 确保vendor目录存在
        mkdir -p vendor
        
        # 检查lolhtml是否已存在
        if [ -d "vendor/lolhtml" ]; then
          echo "lolhtml already exists, updating..."
          cd vendor/lolhtml
          git pull || true
          cd ../..
        else
          echo "Cloning lol_html..."
          # 直接克隆到vendor/lolhtml
          git clone --depth 1 https://github.com/cloudflare/lol-html.git vendor/lolhtml
        fi
        
        # 验证克隆是否成功
        echo "Checking vendor/lolhtml contents:"
        ls -la vendor/lolhtml/ || echo "Directory not found!"
        
        # 验证Cargo.toml存在
        if [ ! -f "vendor/lolhtml/Cargo.toml" ]; then
          echo "ERROR: vendor/lolhtml/Cargo.toml not found!"
          echo "Contents of vendor/lolhtml:"
          ls -la vendor/lolhtml/ || true
          exit 1
        fi
        
        echo "✓ Vendor dependencies ready"
        cat vendor/lolhtml/Cargo.toml | head -20

    - name: Generate build configuration
      env:
        CC: clang-21
        CXX: clang++-21
      run: |
        mkdir -p build/debug/codegen
        bun bd --configure-only
        if [ ! -f "build/debug/codegen/build_options.rs" ]; then
          echo "Error: build_options.rs not generated"
          exit 1
        fi
        echo "✓ Build configuration generated"

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true

    - name: Configure Cargo
      run: |
        mkdir -p ~/.cargo
        cat > ~/.cargo/config.toml << 'EOF'
        [build]
        jobs = 4
        
        [target.x86_64-unknown-linux-gnu]
        linker = "clang-21"
        rustflags = [
            "-C", "target-cpu=core2",
            "-C", "target-feature=+ssse3",
            "-C", "lto=off",
            "-C", "codegen-units=8",
            "-C", "debuginfo=0",
            "-C", "opt-level=0",
            "-C", "panic=abort",
        ]
        
        [profile.release]
        opt-level = 0
        debug = false
        lto = false
        codegen-units = 8
        panic = "abort"
        incremental = false
        EOF

    - name: Build release binary
      env:
        CC: clang-21
        CXX: clang++-21
      run: |
        # 再次确认vendor存在
        echo "Vendor directory contents before build:"
        ls -la vendor/ || true
        
        cargo clean
        cargo build --release --target x86_64-unknown-linux-gnu

    - name: Verify build
      run: |
        echo "=== Binary info ==="
        find target/x86_64-unknown-linux-gnu/release/ -maxdepth 1 -type f -executable | head -5
        echo ""
        echo "=== Binary size ==="
        ls -lh target/x86_64-unknown-linux-gnu/release/ | grep -v "\.d" | grep -v "\.so" | head -10
        echo ""
        echo "=== SSSE3 verification ==="
        BIN=$(find target/x86_64-unknown-linux-gnu/release/ -maxdepth 1 -type f -executable | head -1)
        if [ -n "$BIN" ]; then
          objdump -d "$BIN" 2>/dev/null | grep -i ssse3 | head -10 || echo "No SSSE3 instructions found"
          echo ""
          echo "SSSE3 instructions count:"
          objdump -d "$BIN" 2>/dev/null | grep -i ssse3 | wc -l
        else
          echo "No binary found to verify"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: core2-ssse3-binary
        path: |
          target/x86_64-unknown-linux-gnu/release/
          !target/x86_64-unknown-linux-gnu/release/*.d
        if-no-files-found: error
        retention-days: 30
