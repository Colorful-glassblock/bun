name: Build for Core2 with SSSE3

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1
    
    - name: Setup vendor dependencies
      run: |
        mkdir -p vendor
        if [ ! -d "vendor/lolhtml" ]; then
          echo "Cloning lol_html..."
          git clone --depth 1 https://github.com/cloudflare/lol-html.git vendor/lolhtml
        fi
        if [ ! -f "vendor/lolhtml/Cargo.toml" ]; then
          echo "Error: vendor/lolhtml/Cargo.toml not found"
          exit 1
        fi
        echo "✓ Vendor dependencies ready"
    
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu
    
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
    
    - name: Configure Cargo
      run: |
        mkdir -p ~/.cargo
        cat > ~/.cargo/config.toml << 'EOF'
        [build]
        jobs = 4
        
        [target.x86_64-unknown-linux-gnu]
        linker = "clang"
        rustflags = [
            "-C", "target-cpu=core2",
            "-C", "target-feature=+ssse3",
            "-C", "lto=off",
            "-C", "codegen-units=8",
            "-C", "debuginfo=0",
            "-C", "opt-level=0",
            "-C", "panic=abort",
        ]
        
        [profile.release]
        opt-level = 0
        debug = false
        lto = false
        codegen-units = 8
        panic = "abort"
        incremental = false
        EOF
    
    - name: Build release binary
      run: |
        cargo clean
        cargo build --release --target x86_64-unknown-linux-gnu
    
    - name: Verify build
      run: |
        echo "=== Binary info ==="
        ls -lh target/x86_64-unknown-linux-gnu/release/ | grep -v "\.d" | head -10
        echo ""
        echo "=== SSSE3 verification ==="
        find target/x86_64-unknown-linux-gnu/release/ -maxdepth 1 -type f -executable | head -1 | xargs -r objdump -d 2>/dev/null | grep -i ssse3 | head -10 || echo "No SSSE3 instructions found"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: core2-ssse3-binary
        path: |
          target/x86_64-unknown-linux-gnu/release/
          !target/x86_64-unknown-linux-gnu/release/*.d
        if-no-files-found: error
        retention-days: 30
